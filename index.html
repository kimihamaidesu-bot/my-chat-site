<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="brand">Chat Room</div>
      <ul class="room-list" id="roomList">
        <li class="active">🌸 一般チャット</li>
      </ul>
      <button class="add-btn" onclick="addRoom()">+ 部屋を追加</button>
    </aside>
    <main class="chat-main">
      <div class="chat-header" id="currentRoom">一般チャット</div>
      <div id="messages" class="chat-messages"></div>
      <div class="chat-input-area">
        <div class="input-row">
          <input type="text" id="nameInput" placeholder="お名前" maxlength="9">
          <input type="password" id="passInput" placeholder="Pass">
        </div>
        <div class="input-row">
          <input type="text" id="msgInput" placeholder="メッセージ...">
          <button onclick="addMessage()" class="send-btn">送信</button>
        </div>
      </div>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
